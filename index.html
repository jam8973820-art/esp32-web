<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ESP32-S3 家電控制</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
  margin: 0;
  padding-bottom: 100px;
}

h2, h3 { margin: 16px 0; }

#status {
  margin-bottom: 10px;
  font-size: 14px;
  color: #666;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 380px;
  margin: auto;
  padding: 0 10px;
}

button.device-btn {
  height: 65px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #aaa;
  color: white;
  cursor: pointer;
}

button.device-btn.on { background: #2ecc71; }

/* 定時設定區塊樣式 */
.schedule-container {
  max-width: 380px;
  margin: 20px auto;
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.schedule-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding: 8px;
  background: #f9f9f9;
  border-radius: 5px;
  font-size: 14px;
}

.schedule-controls {
  margin-top: 15px;
  border-top: 1px solid #eee;
  padding-top: 15px;
}

select {
  padding: 5px;
  font-size: 14px;
  border-radius: 4px;
  border: 1px solid #ccc;
}

.action-btn {
  padding: 8px 12px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
  margin: 5px;
  font-size: 14px;
}

.add-btn { background: #4285f4; color: white; }
.sync-btn { background: #e67e22; color: white; width: 90%; font-weight: bold; }
.del-btn { background: #e74c3c; color: white; padding: 2px 8px; }

#micBtn {
  margin: 15px;
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 20px;
  background: #4285f4;
  color: white;
  border: none;
}

#voiceArea {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #ddd;
  padding: 10px;
  z-index: 100;
}

#voiceText {
  min-height: 24px;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>ESP32-S3 家電控制</h2>
<div id="status">MQTT 連線中...</div>

<div class="grid" id="buttons"></div>

<button id="micBtn">🎤 語音控制</button>

<div class="schedule-container">
  <h3>🕒 定時任務管理</h3>
  <div id="scheduleList">
    <div style="color:#999; font-size:12px; margin:10px;">目前尚無設定</div>
  </div>

  <div class="schedule-controls">
    <div>
      <select id="selEn"><option value="true">啟用</option><option value="false">停用</option></select>
      <select id="selH"></select>時
      <select id="selM"></select>分
    </div>
    <div style="margin-top:10px;">
      <select id="selID"></select>
      <select id="selCmd"><option value="ON">開啟</option><option value="OFF">關閉</option></select>
      <button class="action-btn add-btn" onclick="addSchedule()">➕ 新增</button>
    </div>
    <hr>
    <button class="action-btn sync-btn" onclick="syncToDevice()">☁️ 同步設定到設備</button>
  </div>
</div>

<div id="voiceArea">
  <div id="voiceText">請說指令…</div>
</div>

<script>
/* ===== 裝置名稱 ===== */
const DEVICE_NAMES = [
  "房間電燈", "戶外電燈", "客廳電燈", "客廳風扇",
  "設備5", "設備6", "設備7", "設備8", "設備9"
];

/* ===== MQTT 設定 ===== */
const BROKER = "wss://yb01715d.ala.asia-southeast1.emqxsl.com:8084/mqtt";
const USERNAME = "jyhon";
const PASSWORD = "jyhon";
const CLIENT_ID = "web_" + Math.random().toString(16).substr(2, 8);

const deviceState = {};
const scheduleData = []; // 存儲定時任務陣列
const buttonsDiv = document.getElementById("buttons");

/* 初始化選單內容 */
function initSelects() {
  const selH = document.getElementById("selH");
  const selM = document.getElementById("selM");
  const selID = document.getElementById("selID");

  for (let i = 0; i < 24; i++) selH.add(new Option(i < 10 ? "0"+i : i, i));
  for (let i = 0; i < 60; i += 5) selM.add(new Option(i < 10 ? "0"+i : i, i)); // 每5分鐘一個級距
  DEVICE_NAMES.forEach((name, i) => selID.add(new Option(name, i + 1)));
}
initSelects();

/* 建立按鈕 */
DEVICE_NAMES.forEach((name, i) => {
  const id = i + 1;
  deviceState[id] = false;
  const btn = document.createElement("button");
  btn.id = "btn" + id;
  btn.className = "device-btn";
  btn.innerText = `${name}（關）`;
  btn.onclick = () => toggleDevice(id);
  buttonsDiv.appendChild(btn);
});

/* MQTT 連線 */
const client = mqtt.connect(BROKER, {
  username: USERNAME,
  password: PASSWORD,
  clientId: CLIENT_ID,
  reconnectPeriod: 3000
});

client.on("connect", () => {
  document.getElementById("status").innerText = "MQTT 已連線";
  for (let i = 1; i <= 9; i++) {
    client.subscribe(`jam1liau2/sw${i}/state`);
  }
});

client.on("message", (topic, message) => {
  const text = message.toString().trim();
  const swMatch = topic.trim().match(/jam1liau2\/sw(\d+)\/state/i);
  if (swMatch) {
    const id = parseInt(swMatch[1]);
    deviceState[id] = (text.toUpperCase() === "ON");
    updateButton(id);
  }
});

function toggleDevice(id) {
  const targetState = deviceState[id] ? "OFF" : "ON";
  client.publish(`jam1liau2/sw${id}/set`, targetState, { qos: 1, retain: true });
}

function updateButton(id) {
  const btn = document.getElementById("btn" + id);
  if (!btn) return;
  const name = DEVICE_NAMES[id - 1];
  if (deviceState[id]) {
    btn.classList.add("on");
    btn.innerText = `${name}（開）`;
  } else {
    btn.classList.remove("on");
    btn.innerText = `${name}（關）`;
  }
}

/* ===== 定時任務邏輯 ===== */
function addSchedule() {
  if (scheduleData.length >= 10) { alert("最多只能設定 10 組任務"); return; }
  
  const task = {
    en: document.getElementById("selEn").value === "true",
    h: parseInt(document.getElementById("selH").value),
    m: parseInt(document.getElementById("selM").value),
    id: parseInt(document.getElementById("selID").value),
    cmd: document.getElementById("selCmd").value
  };
  
  scheduleData.push(task);
  renderSchedule();
}

function removeSchedule(index) {
  scheduleData.splice(index, 1);
  renderSchedule();
}

function renderSchedule() {
  const list = document.getElementById("scheduleList");
  if (scheduleData.length === 0) {
    list.innerHTML = '<div style="color:#999; font-size:12px; margin:10px;">目前尚無設定</div>';
    return;
  }
  
  list.innerHTML = "";
  scheduleData.forEach((item, index) => {
    const row = document.createElement("div");
    row.className = "schedule-row";
    const timeStr = `${item.h < 10 ? '0' + item.h : item.h}:${item.m < 10 ? '0' + item.m : item.m}`;
    const devName = DEVICE_NAMES[item.id - 1];
    const statusStr = item.en ? "✅" : "⚪";
    row.innerHTML = `
      <span>${statusStr} ${timeStr} - ${devName} (${item.cmd})</span>
      <button class="del-btn" onclick="removeSchedule(${index})">✕</button>
    `;
    list.appendChild(row);
  });
}

function syncToDevice() {
  if (!client.connected) { alert("MQTT 未連線，無法同步"); return; }
  
  // 將資料轉為 JSON 字串發送
  const jsonStr = JSON.stringify(scheduleData);
  client.publish("jam1liau2/schedule/set", jsonStr, { qos: 1 });
  alert("設定已同步到設備！");
}

/* ===== 語音控制 (保持原樣) ===== */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = "zh-TW";
  recognition.interimResults = true;
  recognition.onstart = () => { document.getElementById("voiceText").innerText = "🎧 聆聽中..."; };
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById("voiceText").innerText = text;
    handleVoice(text);
  };
  recognition.onend = () => { setTimeout(() => document.getElementById("voiceText").innerText = "請說指令…", 2000); };
  document.getElementById("micBtn").onclick = () => recognition.start();
}

function handleVoice(text) {
  const isOn = /開|打開|開啟/.test(text);
  const isOff = /關|關閉/.test(text);
  if (!isOn && !isOff) return;
  let id = null;
  DEVICE_NAMES.forEach((name, i) => { if (text.includes(name)) id = i + 1; });
  const m = text.match(/第?\s*(\d+)/);
  if (!id && m) id = parseInt(m[1]);
  if (id >= 1 && id <= 9) {
    client.publish(`jam1liau2/sw${id}/set`, (isOn ? "ON" : "OFF"), { qos: 1, retain: true });
  }
}
</script>

</body>
</html>
